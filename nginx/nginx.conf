# /nginx/nginx.conf

server {
    # EC2 서버의 80번 포트에서 들어오는 요청을 수신합니다.
    listen 80;

    # 이 서버 블록이 처리할 도메인 이름을 지정합니다.
    # 여러 개를 띄어쓰기로 구분하여 적을 수 있습니다.
    server_name ozboard.shop www.ozboard.shop;

    # charset 설정 (한글 깨짐 방지)
    charset utf-8;

    # 클라이언트가 보낼 수 있는 최대 요청 본문 크기 (파일 업로드 등)
    client_max_body_size 128M;

    # --- API 및 일반 페이지 요청 처리 ---
    # /static/ 또는 /media/ 가 아닌 모든 요청은 이 블록에서 처리됩니다.
    location / {
        # 요청을 'backend' 서비스의 8000번 포트로 전달합니다.
        # 'backend'는 docker-compose.yml에 정의된 서비스 이름입니다.
        proxy_pass http://ozblind-be-backend:8000;

        # 백엔드 서버가 실제 클라이언트의 정보를 알 수 있도록 헤더를 설정합니다.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 정적 파일(Static Files) 요청 처리 ---
    # URL 경로가 /static/ 으로 시작하는 모든 요청은 이 블록에서 처리됩니다.
    location /static/ {
        # Nginx가 컨테이너 내부의 /app/static/ 폴더에서 직접 파일을 찾아 서빙합니다.
        # 'alias'는 URL 경로의 일부를 파일 시스템 경로로 매핑합니다.
        alias /app/static/;
    }

    # --- 미디어 파일(Media Files) 요청 처리 ---
    # URL 경로가 /media/ 로 시작하는 모든 요청은 이 블록에서 처리됩니다.
    location /media/ {
        # Nginx가 컨테이너 내부의 /app/media/ 폴더에서 직접 파일을 찾아 서빙합니다.
        alias /app/media/;
    }
}