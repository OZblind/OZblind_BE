name: python CI
# 워크플로우가 실행될 이벤트
on:
  push:
    branches: [ "main", "develop"]
  pull_request:
    branches: [ "main", "develop"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_UNSECURE_COMMANDS: true
    defaults:
      run:
        shell: bash

    steps:
      # 저장소 코드 체크아웃
      - uses: actions/checkout@v4

      # Python 3.13 설정
      - name: Set up python3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # uv 설치
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      # 가상환경 생성 및 활성화
      - name: Create and activate virtual environment
        run: |
          uv venv
          source .venv/bin/activate
          echo "VIRTUAL_ENV=$(pwd)/.venv" >> $GITHUB_ENV
          echo "::add-path::$(pwd)/.venv/bin"

      # 의존성 설치
      - name: Install dependencies
        shell: bash
        run: uv sync

      # 코드 포맷 검사 (isort)
      - name: Run isort
        shell: bash
        run: |
          source .venv/bin/activate
          isort .

      # Black 설치 확인 및 설치
      - name: Check Black installation (using uv) and reinstall if missing
        shell: bash
        run: |
          source .venv/bin/activate
          python -c "import black" || uv pip install black
          python -m black --version

      # Black 실행
      - name: Run black
        shell: bash
        run: |
          source .venv/bin/activate
          python -m black .

      # EC2 배포
      - name: Deploy to EC2
        if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/OZblind_BE
            git pull origin develop

            echo "DB_NAME=${{ secrets.DB_NAME }}" > .env
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> .env
            echo "DJANGO_DEBUG=${{ secrets.DJANGO_DEBUG }}" >> .env
            echo "DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }}" >> .env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env

            docker-compose up -d --build